# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIGURATION (Local H2)
# ===============================
spring.datasource.url=jdbc:h2:mem:examhub;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Silence SQL statement logging in local runs
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

# ===============================
# H2 CONSOLE
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# ===============================
# CORS CONFIGURATION
# ===============================
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ===============================
# PAGINATION DEFAULTS
# ===============================
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# ===============================
# ADMIN SECURITY
# ===============================
admin.secret.key=John@004

# ===============================
# LOCAL FILE STORAGE
# ===============================
storage.upload-dir=uploads