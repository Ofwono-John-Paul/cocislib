# Local development profile (activated by Maven spring-boot:run)
# Uses an embedded H2 database so no shell environment variables are required.
spring.datasource.url=jdbc:h2:mem:examhub;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Keep cloudinary optional in local mode
cloudinary.cloud_name=
cloudinary.api_key=
cloudinary.api_secret=
